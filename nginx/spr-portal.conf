# SPR Open Data Portal — Nginx config.
# Place at /etc/nginx/sites-available/spr-portal then symlink to sites-enabled.
#
# Replace placeholders:
#   __PUBLIC_DOMAIN__   → opendata.spr.gov.my (atau apa-apa)
#   __WP_INTERNAL__     → wp-internal.spr.local (atau IP, contoh 10.0.0.5)

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP → HTTPS redirect (certbot will edit this block on first run)
server {
    listen 80;
    listen [::]:80;
    server_name __PUBLIC_DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __PUBLIC_DOMAIN__;

    # SSL — certbot will inject these paths after running `certbot --nginx`.
    # ssl_certificate     /etc/letsencrypt/live/__PUBLIC_DOMAIN__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__PUBLIC_DOMAIN__/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Body size — allow Excel download passthrough if needed
    client_max_body_size 50M;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ────────────────────────────────────────────────────────────────────────
    # WP MEDIA PROXY — imej/PDF dari WP internal disurihan via domain public
    # ────────────────────────────────────────────────────────────────────────
    location /wp-content/ {
        proxy_pass        http://__WP_INTERNAL__/wp-content/;
        proxy_set_header  Host            __WP_INTERNAL__;
        proxy_set_header  X-Real-IP       $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;

        # Aggressive cache — media tak kerap berubah
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # Hide WP-internal headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header X-Pingback;
    }

    # WP uploads di /wp-uploads kalau guna custom path (optional)
    # location /wp-uploads/ {
    #     proxy_pass http://__WP_INTERNAL__/wp-uploads/;
    #     ...
    # }

    # WP admin — kalau guna Option A (siteurl set ke public domain),
    # restrict admin ke internal subnet sahaja. Uncomment untuk enable:
    # location /wp-admin/ {
    #     allow 10.0.0.0/8;
    #     deny all;
    #     proxy_pass http://__WP_INTERNAL__/wp-admin/;
    #     proxy_set_header Host __WP_INTERNAL__;
    # }
    # location /wp-login.php {
    #     allow 10.0.0.0/8;
    #     deny all;
    #     proxy_pass http://__WP_INTERNAL__/wp-login.php;
    #     proxy_set_header Host __WP_INTERNAL__;
    # }

    # ────────────────────────────────────────────────────────────────────────
    # NEXT.JS APP
    # ────────────────────────────────────────────────────────────────────────

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 200 365d;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Pre-converted Excel JSON — moderate cache
    location /data/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Everything else → Next.js (pages + API routes incl /api/rebuild)
    location / {
        proxy_pass         http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
